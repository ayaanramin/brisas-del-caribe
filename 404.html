<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect 404s to the index.html with the correct path
      var pathSegmentsToKeep = 1;
      var l = window.location;
      
      // Get the full path after /brisas-del-caribe/
      var pathAfterRepo = l.pathname.replace('/brisas-del-caribe', '');
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/brisas-del-caribe/?p=' + pathAfterRepo +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
